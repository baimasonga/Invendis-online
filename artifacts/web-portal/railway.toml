[build]
builder = "RAILPACK"
# VITE_API_URL must be set as a build variable — it is baked into the JS bundle at build time.
# Example: https://invendis-api.up.railway.app
buildCommand = "cd ../.. && pnpm install --frozen-lockfile && pnpm --filter @workspace/web-portal run build"

[deploy]
startCommand = "node server.mjs"
healthcheckPath = "/"
healthcheckTimeout = 10
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
