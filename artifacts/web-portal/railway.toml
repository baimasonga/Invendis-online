[build]
builder = "RAILPACK"
# npm auto-install runs first (from service root package.json — now npm-compatible).
# Our build command then removes the npm node_modules, goes to the monorepo root,
# installs everything properly with pnpm, and compiles the Vite bundle.
# VITE_API_URL must be set as a Railway build variable — baked into the JS bundle.
buildCommand = "rm -rf node_modules && cd ../.. && npm install -g pnpm@9 && pnpm install --frozen-lockfile && pnpm --filter @workspace/web-portal run build"

[deploy]
startCommand = "node server.mjs"
healthcheckPath = "/"
healthcheckTimeout = 10
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
