[build]
builder = "NIXPACKS"
# Install from monorepo root so shared workspace packages (api-zod, db) are available,
# then build just the API server bundle.
buildCommand = "cd ../.. && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build"

[deploy]
startCommand = "node --enable-source-maps dist/index.mjs"
healthcheckPath = "/healthz"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
