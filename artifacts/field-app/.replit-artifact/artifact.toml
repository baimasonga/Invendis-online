kind = "mobile"
previewPath = "/field-app/"
title = "Invendis Field App"
version = "1.0.0"
id = "artifacts/field-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/field-app/" ]
localPort = 24635

[services.development]
run = "pnpm --filter @workspace/field-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/field-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/field-app", "run", "serve" ]

[services.env]
PORT = "24635"
BASE_PATH = "/field-app/"
