          nullable: true
        nationalId:
          type: string
          nullable: true
        districtId:
          type: integer
        districtName:
          type: string
          nullable: true
        chiefdomId:
          type: integer
          nullable: true
        chiefdomName:
          type: string
          nullable: true
        sectionId:
          type: integer
          nullable: true
        communityId:
          type: integer
          nullable: true
        communityName:
          type: string
          nullable: true
