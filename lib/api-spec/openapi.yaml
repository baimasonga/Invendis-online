            $ref: "#/components/schemas/ChartDataPoint"
      required: [total, approved, pending, rejected, byGender, byDistrict, byValueChain]

    # INVENTORY
    InputItem:
      type: object
      properties:
        id:
          type: integer
        code:
          type: string
        name:
          type: string
        category:
          type: string
        valueChainId:
          type: integer
          nullable: true
        valueChainName:
          type: string
          nullable: true
        unitOfMeasure:
          type: string
        description:
          type: string
          nullable: true
        isActive:
          type: boolean
        createdAt:
          type: string
          format: date-time
      required: [id, code, name, category, unitOfMeasure, isActive, createdAt]

    CreateInputItemBody:
      type: object
      properties:
