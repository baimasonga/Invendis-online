        farmSize:
          type: number
          nullable: true
        gpsLatitude:
          type: number
          nullable: true
        gpsLongitude:
          type: number
          nullable: true
        ageGroup:
          type: string
          nullable: true
        farmerGroup:
          type: string
          nullable: true
      required: [firstName, lastName, gender, districtId, valueChainId]

    UpdateFarmerBody:
      type: object
      properties:
        firstName:
          type: string
        lastName:
          type: string
        gender:
          type: string
          enum: [Male, Female, Other]
        phone:
          type: string
          nullable: true
        districtId:
          type: integer
        valueChainId:
          type: integer
