        inputItemCode:
          type: string
        unitOfMeasure:
          type: string
        batchNumber:
          type: string
          nullable: true
        available:
          type: integer
        reserved:
          type: integer
        loaded:
          type: integer
        delivered:
          type: integer
        returned:
          type: integer
        damaged:
          type: integer
        total:
          type: integer
      required: [warehouseId, warehouseName, inputItemId, inputItemName, inputItemCode, unitOfMeasure, available, reserved, loaded, delivered, returned, damaged, total]

    ReceiveStockBody:
      type: object
