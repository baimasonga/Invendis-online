components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required: [success]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        message:
          type: string
      required: [error]

    # AUTH
    LoginBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required: [username, password]

    LoginResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/UserProfile"
      required: [token, user]

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        fullName:
          type: string
        email:
          type: string
        role:
          type: string
        districtId:
          type: integer
          nullable: true
        isActive:
          type: boolean
      required: [id, username, fullName, email, role, isActive]

    # DASHBOARD
    DashboardSummary:
      type: object
      properties:
        totalFarmers:
          type: integer
        approvedFarmers:
          type: integer
        pendingFarmers:
          type: integer
        totalStock:
          type: integer
        distributedInputs:
          type: integer
        pendingPod:
          type: integer
        exceptions:
          type: integer
        activeVehicles:
          type: integer
        activeCampaigns:
          type: integer
        stockVariance:
          type: number
      required: [totalFarmers, approvedFarmers, pendingFarmers, totalStock, distributedInputs, pendingPod, exceptions, activeVehicles, activeCampaigns, stockVariance]

    DashboardCharts:
      type: object
      properties:
        distributionByDistrict:
          type: array
          items:
            $ref: "#/components/schemas/ChartDataPoint"
        distributionByValueChain:
          type: array
          items:
            $ref: "#/components/schemas/ChartDataPoint"
        genderDistribution:
          type: array
          items:
            $ref: "#/components/schemas/ChartDataPoint"
        stockMovementTrend:
          type: array
          items:
            $ref: "#/components/schemas/TrendDataPoint"
        podStatusBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/ChartDataPoint"
      required: [distributionByDistrict, distributionByValueChain, genderDistribution, stockMovementTrend, podStatusBreakdown]

    ChartDataPoint:
      type: object
      properties:
        name:
          type: string
        value:
          type: number
        color:
          type: string
          nullable: true
      required: [name, value]

    TrendDataPoint:
      type: object
      properties:
        date:
          type: string
        received:
          type: number
        delivered:
          type: number
        returned:
          type: number
      required: [date, received, delivered, returned]

    ActivityItem:
      type: object
      properties:
        id:
          type: integer
        type:
          type: string
        description:
          type: string
        user:
          type: string
        timestamp:
          type: string
          format: date-time
        module:
          type: string
      required: [id, type, description, user, timestamp, module]

    # MASTER DATA
    District:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        code:
          type: string
      required: [id, name, code]

    CreateDistrictBody:
      type: object
      properties:
        name:
          type: string
        code:
          type: string
      required: [name, code]

    Chiefdom:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        districtId:
          type: integer
        districtName:
          type: string
          nullable: true
      required: [id, name, districtId]

    Section:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        chiefdomId:
          type: integer
      required: [id, name, chiefdomId]

    Community:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        sectionId:
          type: integer
      required: [id, name, sectionId]

    ValueChain:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        isActive:
          type: boolean
      required: [id, name, isActive]

    CreateValueChainBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
      required: [name]

    Warehouse:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        code:
          type: string
        districtId:
          type: integer
          nullable: true
        districtName:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
        isActive:
          type: boolean
      required: [id, name, code, isActive]

    CreateWarehouseBody:
      type: object
      properties:
        name:
          type: string
        code:
          type: string
        districtId:
          type: integer
          nullable: true
        address:
          type: string
          nullable: true
      required: [name, code]

    # FARMERS
