        warehouseId:
          type: integer
        inputItemId:
          type: integer
        quantity:
          type: integer
        batchNumber:
          type: string
          nullable: true
        expiryDate:
          type: string
          format: date
          nullable: true
        supplierId:
          type: integer
          nullable: true
        procurementOrderId:
          type: integer
          nullable: true
        notes:
          type: string
          nullable: true
      required: [warehouseId, inputItemId, quantity]

    TransferStockBody:
      type: object
