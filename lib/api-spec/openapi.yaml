openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Agri-PoD Inventory & Distribution System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: dashboard
    description: Dashboard summary
  - name: farmers
    description: Farmer registry
  - name: master-data
    description: Master data (districts, chiefdoms, value chains, etc.)
  - name: inventory
    description: Input catalogue and stock management
  - name: warehouses
    description: Warehouse management
  - name: procurement
    description: Procurement orders
  - name: campaigns
    description: Distribution campaigns
  - name: allocations
    description: Farmer allocations
  - name: vehicles
    description: Vehicle and driver management
  - name: dispatch
    description: Vehicle dispatch manifests
  - name: gps
    description: Vehicle GPS tracking
  - name: pod
    description: Proof of Delivery
  - name: reconciliation
    description: Stock reconciliation
  - name: reports
    description: Reports
  - name: audit
    description: Audit logs
  - name: users
    description: User management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # AUTH
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  # DASHBOARD
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary cards
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/charts:
    get:
      operationId: getDashboardCharts
      tags: [dashboard]
      summary: Get dashboard chart data
      responses:
        "200":
          description: Dashboard chart data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardCharts"

  /dashboard/recent-activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent activity feed
      responses:
        "200":
          description: Recent activity
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  # MASTER DATA
  /master-data/districts:
    get:
      operationId: listDistricts
      tags: [master-data]
      summary: List districts
      responses:
        "200":
          description: Districts list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/District"
    post:
      operationId: createDistrict
      tags: [master-data]
      summary: Create district
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDistrictBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/District"

  /master-data/chiefdoms:
    get:
      operationId: listChiefdoms
      tags: [master-data]
      summary: List chiefdoms
      parameters:
        - name: districtId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Chiefdoms list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Chiefdom"

  /master-data/sections:
    get:
      operationId: listSections
      tags: [master-data]
      summary: List sections
      parameters:
        - name: chiefdomId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Sections list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Section"

  /master-data/communities:
    get:
      operationId: listCommunities
      tags: [master-data]
      summary: List communities
      parameters:
        - name: sectionId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Communities list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Community"

  /master-data/value-chains:
    get:
      operationId: listValueChains
      tags: [master-data]
      summary: List value chains
      responses:
        "200":
          description: Value chains
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ValueChain"
    post:
      operationId: createValueChain
      tags: [master-data]
      summary: Create value chain
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateValueChainBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValueChain"

  /master-data/warehouses:
    get:
      operationId: listWarehouses
      tags: [master-data]
      summary: List warehouses
      responses:
        "200":
          description: Warehouses list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Warehouse"
    post:
      operationId: createWarehouse
      tags: [master-data]
      summary: Create warehouse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWarehouseBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Warehouse"

  # FARMERS
  /farmers:
    get:
      operationId: listFarmers
      tags: [farmers]
      summary: List farmers
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, approved, rejected]
        - name: districtId
          in: query
          schema:
            type: integer
        - name: valueChainId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Farmers list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedFarmers"
    post:
      operationId: createFarmer
      tags: [farmers]
      summary: Register farmer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFarmerBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Farmer"

  /farmers/{id}:
    get:
      operationId: getFarmer
      tags: [farmers]
      summary: Get farmer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Farmer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Farmer"
    put:
      operationId: updateFarmer
      tags: [farmers]
      summary: Update farmer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFarmerBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Farmer"

  /farmers/{id}/approve:
    post:
      operationId: approveFarmer
      tags: [farmers]
      summary: Approve farmer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Farmer"

  /farmers/{id}/reject:
    post:
      operationId: rejectFarmer
      tags: [farmers]
      summary: Reject farmer
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectFarmerBody"
      responses:
        "200":
          description: Rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Farmer"

  /farmers/stats:
    get:
      operationId: getFarmerStats
      tags: [farmers]
      summary: Get farmer statistics
      responses:
        "200":
          description: Farmer statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FarmerStats"

  # INVENTORY
  /inventory/input-items:
    get:
      operationId: listInputItems
      tags: [inventory]
      summary: List input items catalogue
      responses:
        "200":
          description: Input items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InputItem"
    post:
      operationId: createInputItem
      tags: [inventory]
      summary: Create input item
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInputItemBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InputItem"

  /inventory/stock-balance:
    get:
      operationId: getStockBalance
      tags: [inventory]
      summary: Get stock balance across warehouses
      parameters:
        - name: warehouseId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Stock balance
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockBalance"

  /inventory/receive-stock:
    post:
      operationId: receiveStock
      tags: [inventory]
      summary: Receive stock into warehouse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReceiveStockBody"
      responses:
        "201":
          description: Stock received
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockTransaction"

  /inventory/transfer-stock:
    post:
      operationId: transferStock
      tags: [inventory]
      summary: Transfer stock between warehouses
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransferStockBody"
      responses:
        "201":
          description: Stock transferred
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockTransaction"

  /inventory/stock-transactions:
    get:
      operationId: listStockTransactions
      tags: [inventory]
      summary: List stock transactions
      parameters:
        - name: warehouseId
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        "200":
          description: Stock transactions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedStockTransactions"

  # PROCUREMENT
  /procurement:
    get:
      operationId: listProcurementOrders
      tags: [procurement]
      summary: List procurement orders
      responses:
        "200":
          description: Procurement orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProcurementOrder"
    post:
      operationId: createProcurementOrder
      tags: [procurement]
      summary: Create procurement order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProcurementOrderBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcurementOrder"

  /procurement/{id}:
    get:
      operationId: getProcurementOrder
      tags: [procurement]
      summary: Get procurement order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Procurement order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProcurementOrder"

  # CAMPAIGNS
  /campaigns:
    get:
      operationId: listCampaigns
      tags: [campaigns]
      summary: List campaigns
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [Draft, Submitted, Approved, Active, Completed, Cancelled]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        "200":
          description: Campaigns
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedCampaigns"
    post:
      operationId: createCampaign
      tags: [campaigns]
      summary: Create campaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCampaignBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"

  /campaigns/{id}:
    get:
      operationId: getCampaign
      tags: [campaigns]
      summary: Get campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Campaign
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"
    put:
      operationId: updateCampaign
      tags: [campaigns]
      summary: Update campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCampaignBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"

  /campaigns/{id}/approve:
    post:
      operationId: approveCampaign
      tags: [campaigns]
      summary: Approve campaign
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"

  /campaigns/{id}/submit:
    post:
      operationId: submitCampaign
      tags: [campaigns]
      summary: Submit campaign for approval
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Campaign"

  /campaigns/stats:
    get:
      operationId: getCampaignStats
      tags: [campaigns]
      summary: Get campaign statistics
      responses:
        "200":
          description: Campaign statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CampaignStats"

  # ALLOCATIONS
  /allocations:
    get:
      operationId: listAllocations
      tags: [allocations]
      summary: List farmer allocations
      parameters:
        - name: campaignId
          in: query
          schema:
            type: integer
        - name: farmerId
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        "200":
          description: Allocations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedAllocations"
    post:
      operationId: createAllocation
      tags: [allocations]
      summary: Allocate farmer to campaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAllocationBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Allocation"

  /allocations/bulk:
    post:
      operationId: bulkAllocateFarmers
      tags: [allocations]
      summary: Bulk allocate farmers to campaign
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkAllocationBody"
      responses:
        "201":
          description: Bulk created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkAllocationResult"

  # VEHICLES
  /vehicles:
    get:
      operationId: listVehicles
      tags: [vehicles]
      summary: List vehicles
      responses:
        "200":
          description: Vehicles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vehicle"
    post:
      operationId: createVehicle
      tags: [vehicles]
      summary: Register vehicle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVehicleBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"

  /vehicles/{id}:
    get:
      operationId: getVehicle
      tags: [vehicles]
      summary: Get vehicle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Vehicle
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vehicle"

  /vehicles/drivers:
    get:
      operationId: listDrivers
      tags: [vehicles]
      summary: List drivers
      responses:
        "200":
          description: Drivers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Driver"
    post:
      operationId: createDriver
      tags: [vehicles]
      summary: Register driver
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDriverBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Driver"

  # DISPATCH
  /dispatch:
    get:
      operationId: listDispatches
      tags: [dispatch]
      summary: List vehicle dispatches
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: campaignId
          in: query
          schema:
            type: integer
        - name: page
          in: query
          schema:
            type: integer
            default: 1
      responses:
        "200":
          description: Dispatches
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedDispatches"
    post:
      operationId: createDispatch
      tags: [dispatch]
      summary: Create vehicle dispatch
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDispatchBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dispatch"

  /dispatch/{id}:
    get:
      operationId: getDispatch
      tags: [dispatch]
      summary: Get dispatch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Dispatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dispatch"

  /dispatch/{id}/approve:
    post:
      operationId: approveDispatch
      tags: [dispatch]
      summary: Approve dispatch
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dispatch"

  /dispatch/{id}/dispatch:
    post:
      operationId: startDispatch
      tags: [dispatch]
      summary: Start dispatch (mark as dispatched)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Dispatched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dispatch"

  /dispatch/{id}/arrive:
    post:
      operationId: markDispatchArrived
      tags: [dispatch]
      summary: Mark dispatch as arrived
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Arrived
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Dispatch"

  # GPS
  /gps/ping:
    post:
      operationId: gpsping
      tags: [gps]
      summary: Record GPS ping
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GpsPingBody"
      responses:
        "201":
          description: Recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /gps/vehicles:
    get:
      operationId: listVehicleGpsStatus
      tags: [gps]
      summary: Get live GPS status for all active vehicles
      responses:
        "200":
          description: Vehicle GPS positions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VehicleGpsStatus"

  /gps/vehicle/{vehicleId}/track:
    get:
      operationId: getVehicleTrack
      tags: [gps]
      summary: Get GPS track for a vehicle
      parameters:
        - name: vehicleId
          in: path
          required: true
          schema:
            type: integer
        - name: dispatchId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: GPS track points
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GpsPoint"

  # PROOF OF DELIVERY
  /pod:
    get:
      operationId: listPod
      tags: [pod]
      summary: List Proof of Delivery records
      parameters:
        - name: campaignId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: farmerId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: PoD records
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedPod"

  /pod/{id}:
    get:
      operationId: getPod
      tags: [pod]
      summary: Get PoD record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: PoD record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProofOfDelivery"

  /pod/submit:
    post:
      operationId: submitPod
      tags: [pod]
      summary: Submit proof of delivery
      requestBody:
        required: true
        content:
          application/json:
            schema:
