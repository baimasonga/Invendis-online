name: Android APK Build (Native Gradle)

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "artifacts/field-app/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/android-native-build.yml"

permissions:
  contents: read

concurrency:
  group: android-native-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: Typecheck Field App
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run typecheck
        run: pnpm --filter @workspace/field-app run typecheck

  build-android:
    name: Build Android APK (Gradle)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: typecheck

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate native Android project (no EAS)
        working-directory: artifacts/field-app
        env:
          CI: "1"
          HTTP_PROXY: ""
          HTTPS_PROXY: ""
          ALL_PROXY: ""
          http_proxy: ""
          https_proxy: ""
          all_proxy: ""
        run: |
          pnpm exec expo prebuild --platform android --clean \
            --skip-dependency-update expo \
            --skip-dependency-update react \
            --skip-dependency-update react-native

      - name: Build release APK
        working-directory: artifacts/field-app/android
        env:
          HTTP_PROXY: ""
          HTTPS_PROXY: ""
          ALL_PROXY: ""
          http_proxy: ""
          https_proxy: ""
          all_proxy: ""
        run: ./gradlew assembleRelease

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: field-app-android-apk
          path: artifacts/field-app/android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
